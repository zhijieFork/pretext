<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo Columns</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f6f0e6;
        --ink: #11100d;
        --muted: #4f463b;
        --accent: #d97757;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--paper);
        color: var(--ink);
      }

      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: default;
      }

      .page {
        position: relative;
        height: 100vh;
        overflow: hidden;
      }

      .stage {
        position: relative;
        height: 100%;
      }

      .headline {
        position: absolute;
        margin: 0;
        font: inherit;
        user-select: text;
        z-index: 1;
      }

      .headline-line {
        position: absolute;
        white-space: pre;
        color: var(--ink);
      }

      .credit {
        position: absolute;
        margin: 0;
        font: 12px/16px "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
        color: rgba(17, 16, 13, 0.58);
        user-select: text;
        z-index: 1;
      }

      .logo {
        position: absolute;
        display: block;
        user-select: none;
        pointer-events: none;
        transform-origin: center center;
        z-index: 3;
      }

      .logo--openai {
        filter: drop-shadow(0 26px 34px rgba(16, 16, 12, 0.14));
      }

      .logo--claude {
        filter: drop-shadow(0 24px 32px rgba(140, 86, 52, 0.18));
      }

      .line {
        position: absolute;
        white-space: pre;
        color: var(--ink);
        font-weight: 450;
        letter-spacing: 0.002em;
        user-select: text;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div id="stage" class="stage"></div>
    </main>

    <script type="module" src="./logo-columns.ts"></script>
  </body>
</html>
